name: Reset Admin Password

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Reset target mode
        required: true
        default: mariadb
        type: choice
        options:
          - mariadb
          - legacy
      username:
        description: Admin username
        required: true
        default: admin
      password:
        description: New password
        required: true

jobs:
  reset-password:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: Reset admin password
        env:
          MODE: ${{ inputs.mode }}
          USERNAME: ${{ inputs.username }}
          NEW_PASSWORD: ${{ inputs.password }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_CONN_LIMIT: ${{ secrets.DB_CONN_LIMIT }}
        run: |
          if [ "$MODE" = "legacy" ]; then
            node backend/scripts/reset-admin-password.js --mode=legacy --username="$USERNAME" --password="$NEW_PASSWORD"
          else
            node backend/scripts/reset-admin-password.js --mode=mariadb --username="$USERNAME" --password="$NEW_PASSWORD"
          fi

