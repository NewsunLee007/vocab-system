name: Reset Admin Password

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Reset target mode
        required: true
        default: mariadb
        type: choice
        options:
          - mariadb
          - legacy
      username:
        description: Admin username
        required: true
        default: admin
      password:
        description: New password
        required: true

jobs:
  reset-password:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - run: npm ci
      - name: Validate required settings
        env:
          MODE: ${{ inputs.mode }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: |
          if [ "$MODE" = "mariadb" ]; then
            missing=0
            for key in DB_HOST DB_PORT DB_USER DB_PASSWORD DB_NAME; do
              if [ -z "${!key}" ]; then
                echo "::error::缺少 GitHub Secret: $key"
                missing=1
              fi
            done
            if [ "$missing" -eq 1 ]; then
              echo "::error::请到 Settings -> Secrets and variables -> Actions 补齐数据库配置后重试"
              exit 1
            fi
          fi
      - name: Reset admin password
        env:
          MODE: ${{ inputs.mode }}
          USERNAME: ${{ inputs.username }}
          NEW_PASSWORD: ${{ inputs.password }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_CONN_LIMIT: ${{ secrets.DB_CONN_LIMIT }}
        run: |
          set -e
          if [ "$MODE" = "legacy" ]; then
            node backend/scripts/reset-admin-password.js --mode=legacy --username="$USERNAME" --password="$NEW_PASSWORD" || {
              echo "::error::legacy 模式重置失败。请确认你确实在使用旧版 NeDB，并且线上数据来自仓库文件。"
              exit 1
            }
          else
            node backend/scripts/reset-admin-password.js --mode=mariadb --username="$USERNAME" --password="$NEW_PASSWORD" || {
              echo "::error::mariadb 模式重置失败。常见原因：数据库地址不可达、账号密码错误、数据库不允许 GitHub Runner 访问。"
              exit 1
            }
          fi
