<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语词汇学习</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/mobile.css">
    <style>
        * { font-family: 'Noto Sans SC', sans-serif; }
        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .mesh-bg {
            background: radial-gradient(at 40% 20%, hsla(253,100%,76%,1) 0px, transparent 50%),
                        radial-gradient(at 80% 0%, hsla(189,100%,56%,1) 0px, transparent 50%),
                        radial-gradient(at 0% 50%, hsla(340,100%,76%,1) 0px, transparent 50%),
                        radial-gradient(at 80% 50%, hsla(266,100%,76%,1) 0px, transparent 50%),
                        radial-gradient(at 0% 100%, hsla(22,100%,77%,1) 0px, transparent 50%),
                        radial-gradient(at 80% 100%, hsla(242,100%,70%,1) 0px, transparent 50%),
                        radial-gradient(at 0% 0%, hsla(343,100%,76%,1) 0px, transparent 50%);
            background-color: #0f0f23;
        }
        .role-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .role-card:hover {
            transform: translateY(-12px) scale(1.02);
        }
    </style>
</head>
<body class="mesh-bg min-h-screen text-slate-800">
    <nav class="fixed top-0 left-0 right-0 bg-white/10 backdrop-blur-xl border-b border-white/20 py-3 px-6 flex justify-center items-center z-50">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 rounded-xl flex items-center justify-center shadow-lg overflow-hidden">
                <img src="https://p.ipic.vip/lmzked.jpg" alt="Logo" class="w-full h-full object-cover">
            </div>
            <div>
                <span class="text-xl font-bold text-white tracking-tight">英语词汇学习</span>
                <span class="text-xs text-white/70 block -mt-1">词汇学习系统</span>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex flex-col items-center justify-center p-6 w-full max-w-6xl mx-auto relative min-h-screen pt-20">
        <div class="w-full fade-in text-center">
            <div class="mb-12">
                <h1 class="text-4xl md:text-6xl font-black text-white mb-4">
                    开启词汇<span class="text-transparent bg-clip-text bg-gradient-to-r from-amber-300 to-orange-400">新篇章</span>
                </h1>
                <p class="text-xl text-white/70 max-w-2xl mx-auto">
                    游戏化学习，让背单词变得有趣
                </p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-5xl mx-auto">
                <!-- 学生端 -->
                <a href="student-login.html" class="role-card bg-white/95 backdrop-blur-xl rounded-3xl p-8 cursor-pointer shadow-2xl border border-white/30 group">
                    <div class="w-20 h-20 mx-auto mb-6 rounded-2xl bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center shadow-xl group-hover:scale-110 transition">
                        <i class="fa-solid fa-user-graduate text-white text-3xl"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-slate-800 mb-2">学生端</h2>
                    <p class="text-slate-500 mb-6">
                        游戏化词汇学习，AI智能记忆<br>
                        积分排行，随时学习
                    </p>
                    <div class="flex items-center justify-center space-x-2 text-emerald-600 font-semibold">
                        <span>进入学习</span>
                        <i class="fa-solid fa-arrow-right group-hover:translate-x-2 transition"></i>
                    </div>
                    <div class="mt-6 flex justify-center space-x-4">
                        <div class="flex items-center text-sm text-slate-400">
                            <i class="fa-solid fa-robot mr-1"></i> AI智能
                        </div>
                        <div class="flex items-center text-sm text-slate-400">
                            <i class="fa-solid fa-gamepad mr-1"></i> 游戏闯关
                        </div>
                    </div>
                </a>

                <!-- 教师端 -->
                <a href="teacher-login.html" class="role-card bg-white/95 backdrop-blur-xl rounded-3xl p-8 cursor-pointer shadow-2xl border border-white/30 group">
                    <div class="w-20 h-20 mx-auto mb-6 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-xl group-hover:scale-110 transition">
                        <i class="fa-solid fa-chalkboard-user text-white text-3xl"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-slate-800 mb-2">教师端</h2>
                    <p class="text-slate-500 mb-6">
                        智能词表定制与检测分发<br>
                        学情追踪，数据导出
                    </p>
                    <div class="flex items-center justify-center space-x-2 text-indigo-600 font-semibold">
                        <span>进入工作台</span>
                        <i class="fa-solid fa-arrow-right group-hover:translate-x-2 transition"></i>
                    </div>
                    <div class="mt-6 flex justify-center space-x-4">
                        <div class="flex items-center text-sm text-slate-400">
                            <i class="fa-solid fa-book mr-1"></i> 词表管理
                        </div>
                        <div class="flex items-center text-sm text-slate-400">
                            <i class="fa-solid fa-chart-line mr-1"></i> 学情统计
                        </div>
                    </div>
                </a>

                <!-- 教务处端 -->
                <a href="admin-login.html" class="role-card bg-white/95 backdrop-blur-xl rounded-3xl p-8 cursor-pointer shadow-2xl border border-white/30 group">
                    <div class="w-20 h-20 mx-auto mb-6 rounded-2xl bg-gradient-to-br from-slate-700 to-slate-900 flex items-center justify-center shadow-xl group-hover:scale-110 transition">
                        <i class="fa-solid fa-building-columns text-white text-3xl"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-slate-800 mb-2">教务处</h2>
                    <p class="text-slate-500 mb-6">
                        全校教师与数据管理中心<br>
                        系统设置，数据备份
                    </p>
                    <div class="flex items-center justify-center space-x-2 text-slate-700 font-semibold">
                        <span>进入总控台</span>
                        <i class="fa-solid fa-arrow-right group-hover:translate-x-2 transition"></i>
                    </div>
                    <div class="mt-6 flex justify-center space-x-4">
                        <div class="flex items-center text-sm text-slate-400">
                            <i class="fa-solid fa-users mr-1"></i> 教师管理
                        </div>
                        <div class="flex items-center text-sm text-slate-400">
                            <i class="fa-solid fa-cog mr-1"></i> 系统设置
                        </div>
                    </div>
                </a>
            </div>

            <div class="mt-16 text-white/60 text-sm">
                <p>已有账号？直接登录对应角色即可</p>
            </div>
        </div>
    </main>
</body>
</html>
